<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Learning App</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#4facfe,#00f2fe);
min-height:100vh;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 0 20px rgba(0,0,0,0.2);
position:relative;
}

h1,h2{
text-align:center;
margin-bottom:20px;
color:#333;
}

input,select{
width:100%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:1px solid #ccc;
}

button{
padding:12px 20px;
border:none;
border-radius:8px;
background:#007bff;
color:white;
cursor:pointer;
margin:10px 5px;
font-size:16px;
}

button:hover{
background:#0056b3;
}

.page{
display:none;
}

.active{
display:block;
}

.top-right{
position:absolute;
top:20px;
right:20px;
}

.card{
background:#f2f2f2;
padding:15px;
border-radius:10px;
margin:15px 0;
}

.quiz-box{
background:#f8f8f8;
padding:15px;
border-radius:10px;
margin:10px 0;
}

.result{
font-size:22px;
text-align:center;
margin-top:20px;
color:green;
}

.nav-buttons{
display:flex;
justify-content:space-between;
margin-top:20px;
}

.admin-data{
max-height:400px;
overflow-y:auto;
padding:10px;
}

</style>
</head>

<body>

<div class="container">

<div class="top-right">
<button onclick="showPage('adminPage')">Admin</button>
</div>

<!-- LOGIN PAGE -->

<div class="page active" id="loginPage">

<h1>Smart Learning App</h1>

<input type="text" id="username" placeholder="Enter Username">

<input type="password" id="password" placeholder="Enter Password">

<button onclick="signup()">Sign Up</button>

<button onclick="login()">Login</button>

</div>

<!-- SETUP PAGE -->

<div class="page" id="setupPage">

<h2>Learning Setup</h2>

<label>Select Class</label>

<select id="studentClass">
<option>Class 6</option>
<option>Class 7</option>
<option>Class 8</option>
<option>Class 9</option>
<option>Class 10</option>
<option>Class 11</option>
<option>Class 12</option>
</select>

<label>Difficulty Level</label>

<select id="difficulty">
<option>Easy</option>
<option>Medium</option>
<option>Hard</option>
</select>

<label>Multiple Intelligence Theme</label>

<select id="intelligence">
<option>Logical Intelligence</option>
<option>Visual Intelligence</option>
<option>Musical Intelligence</option>
<option>Verbal Intelligence</option>
<option>Naturalistic Intelligence</option>
<option>Interpersonal Intelligence</option>
</select>

<label>Learning Method</label>

<select id="method">
<option>Theory</option>
<option>Quiz</option>
<option>Puzzle</option>
<option>Video</option>
<option>Game</option>
</select>

<label>Select Language</label>

<select id="language">
<option>English</option>
<option>Tamil</option>
<option>Kannada</option>
<option>Malayalam</option>
</select>

<div class="nav-buttons">
<button onclick="showPage('loginPage')">⬅ Back</button>
<button onclick="startLesson()">Next ➡</button>
</div>

</div>

<!-- LESSON PAGE -->

<div class="page" id="lessonPage">

<h2>Lesson</h2>

<div class="card">

<h3>Topic : Solar System</h3>

<p id="lessonContent">

The Solar System consists of the Sun and planets revolving around it.

</p>

</div>

<div class="nav-buttons">
<button onclick="showPage('setupPage')">⬅ Back</button>
<button onclick="startQuiz()">Next ➡</button>
</div>

</div>

<!-- QUIZ PAGE -->

<div class="page" id="quizPage">

<h2>Quiz</h2>

<form id="quizForm">

<div id="questions"></div>

<button type="button" onclick="submitQuiz()">Submit Quiz</button>

</form>

<div class="nav-buttons">
<button onclick="showPage('lessonPage')">⬅ Back</button>
</div>

<div class="result" id="result"></div>

</div>

<!-- ADMIN PAGE -->

<div class="page" id="adminPage">

<h2>Admin Dashboard</h2>

<input type="password" id="adminPass" placeholder="Enter Admin Password">

<button onclick="checkAdmin()">Open Dashboard</button>

<div id="adminData" class="admin-data"></div>

<div class="nav-buttons">
<button onclick="showPage('loginPage')">⬅ Back</button>
</div>

</div>

</div>

<script>

let users = [];
let records = [];

let currentUser = "";

const quizQuestions = [

{
q:"Which planet is called Red Planet?",
a:"Mars"
},

{
q:"Which is the biggest planet?",
a:"Jupiter"
},

{
q:"Center of Solar System?",
a:"Sun"
},

{
q:"Earth is the ___ planet from Sun",
a:"Third"
},

{
q:"Planet with rings?",
a:"Saturn"
},

{
q:"Planet that supports life?",
a:"Earth"
},

{
q:"Moon revolves around?",
a:"Earth"
},

{
q:"Total number of planets?",
a:"8"
},

{
q:"Force keeping planets in orbit?",
a:"Gravity"
},

{
q:"Hottest planet?",
a:"Venus"
}

];

function showPage(id){

document.querySelectorAll(".page").forEach(page=>{
page.classList.remove("active");
});

document.getElementById(id).classList.add("active");

}

async function signup(){

let username = document.getElementById("username").value;
let password = document.getElementById("password").value;

let response = await fetch("http://127.0.0.1:5000/signup",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
username,
password
})

});

let data = await response.json();

alert(data.message);

}

async function login(){

let username = document.getElementById("username").value;
let password = document.getElementById("password").value;

let response = await fetch("http://127.0.0.1:5000/login",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
username,
password
})

});

let data = await response.json();

if(response.ok){

currentUser = username;

alert(data.message);

showPage("setupPage");

}
else{

alert(data.message);

}

}

function startLesson(){

let language = document.getElementById("language").value;

let content = "";

if(language==="Tamil"){

content=`
சூரிய குடும்பம் என்பது சூரியன் மற்றும் அதைச் சுற்றி வரும் கோள்கள் ஆகும்.
பூமி சூரியனில் இருந்து மூன்றாவது கோள்.
`;

}

else if(language==="Kannada"){

content=`
ಸೌರಮಂಡಲವು ಸೂರ್ಯ ಮತ್ತು ಅದರ ಸುತ್ತಲೂ ತಿರುಗುವ ಗ್ರಹಗಳನ್ನು ಒಳಗೊಂಡಿದೆ.
ಭೂಮಿ ಸೂರ್ಯನಿಂದ ಮೂರನೇ ಗ್ರಹವಾಗಿದೆ.
`;

}

else if(language==="Malayalam"){

content=`
സൗരയൂഥം സൂര്യനും അതിനെ ചുറ്റി സഞ്ചരിക്കുന്ന ഗ്രഹങ്ങളും അടങ്ങിയതാണ്.
ഭൂമി സൂര്യനിൽ നിന്ന് മൂന്നാമത്തെ ഗ്രഹമാണ്.
`;

}

else{

content=`
The Solar System consists of the Sun and planets revolving around it.
Earth is the third planet from the Sun.
`;

}

document.getElementById("lessonContent").innerHTML=content;

showPage("lessonPage");

}

function startQuiz(){

showPage("quizPage");

let qDiv=document.getElementById("questions");

qDiv.innerHTML="";

quizQuestions.forEach((q,index)=>{

qDiv.innerHTML += `

<div class="quiz-box">

<p><b>${index+1}. ${q.q}</b></p>

<input type="text" id="q${index}">

</div>

`;

});

}

async function submitQuiz(){

let score=0;

quizQuestions.forEach((q,index)=>{

let ans=document.getElementById(`q${index}`).value.trim();

if(ans.toLowerCase()===q.a.toLowerCase()){

score++;

}

});

document.getElementById("result").innerHTML=
`Your Score : ${score}/10`;

let recordData={

user:currentUser,
class:document.getElementById("studentClass").value,
difficulty:document.getElementById("difficulty").value,
intelligence:document.getElementById("intelligence").value,
method:document.getElementById("method").value,
language:document.getElementById("language").value,
score:score

};

await fetch("http://127.0.0.1:5000/save_record",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify(recordData)

});

}

async function checkAdmin(){

let pass=document.getElementById("adminPass").value;

let response = await fetch(
`http://127.0.0.1:5000/admin_records?password=${pass}`
);

let data = await response.json();

if(response.ok){

let adminData=document.getElementById("adminData");

adminData.innerHTML="";

data.forEach((r,index)=>{

adminData.innerHTML += `

<div class="card">

<h3>Student ${index+1}</h3>

<p><b>User:</b> ${r.user}</p>

<p><b>Class:</b> ${r.class}</p>

<p><b>Difficulty:</b> ${r.difficulty}</p>

<p><b>Intelligence:</b> ${r.intelligence}</p>

<p><b>Method:</b> ${r.method}</p>

<p><b>Language:</b> ${r.language}</p>

<p><b>Score:</b> ${r.score}/10</p>

</div>

`;

});

}
else{

alert(data.message);

}

}

</script>

</body>
</html>
